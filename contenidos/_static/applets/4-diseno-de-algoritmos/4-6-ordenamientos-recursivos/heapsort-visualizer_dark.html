<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Heapsort — Visualizador</title>
<style>
:root{
  --bg:#1a1b2e;--fg:#e0e0e0;--border:#374151;
  --btn-bg:#2d3748;--btn-hover:#374151;--btn-text:#e0e0e0;
  --node-fill:#2d3748;--node-stroke:#63b3ed;
  --active-fill:#5a4a00;--active-stroke:#f59e0b;
  --done-fill:#1e3a2f;--done-stroke:#48c774;
  --compare-fill:#5c2020;--compare-stroke:#fc8181;
  --swap-fill:#5a4a00;--swap-stroke:#eab308;
  --inheap-fill:#2d3748;--inheap-stroke:#818cf8;
  --ptr-fill:#1d4ed8;--ptr-text:#ffffff;
  --edge:#9ca3af;
  --panel-bg:#1e2030;
  --highlight:#60a5fa;--error-stroke:#fc8181;--error-fill:#5c2020;
  --slot-stroke:#6b7280;
  --node-text:#e0e0e0;
  --tree-text:#e0e0e0;
  --idx-text:#6b7280;
  --hidden-opacity:0.25;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.applet{display:flex;flex-direction:column;padding:8px;gap:6px;width:100%;max-width:100%;margin:0 auto;flex:1;min-height:0;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--btn-bg);border-radius:6px;border:1px solid var(--border);width:100%;flex-shrink:0;gap:8px}
.header .title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sort-toggle{display:flex;gap:2px;flex-shrink:0}
.sort-toggle button{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--btn-bg);color:var(--btn-text);font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
.sort-toggle button.active{background:var(--highlight);color:#fff;border-color:var(--highlight)}
.sort-toggle button:hover:not(.active){background:var(--btn-hover)}
.main{display:flex;flex:1;min-height:0;gap:8px;width:100%;overflow:hidden}
.viz-wrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.panel{border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:var(--panel-bg);display:flex;flex-direction:column;gap:4px;min-height:0;justify-content:center}
.panel-label{font-size:11px;font-weight:700;color:var(--tree-text);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.arr-row{display:flex;align-items:center;gap:3px;justify-content:center;flex-wrap:wrap}
.arr-cell{width:30px;height:30px;border:2px solid var(--node-stroke);background:var(--node-fill);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:menlo,consola,'DejaVu Sans Mono',monospace;font-size:13px;font-weight:600;color:var(--node-text);position:relative}
.arr-cell.in-heap{background:var(--inheap-fill);border-color:var(--inheap-stroke)}
.arr-cell.out{background:var(--bg);border-color:var(--border);color:var(--slot-stroke);opacity:0.5}
.arr-cell.current{background:var(--active-fill);border-color:var(--active-stroke)}
.arr-cell.compare{background:var(--compare-fill);border-color:var(--compare-stroke)}
.arr-cell.swap{background:var(--swap-fill);border-color:var(--swap-stroke)}
.arr-cell.done{background:var(--done-fill);border-color:var(--done-stroke);color:#065f46}
.tree-wrap{flex:1;min-height:0;overflow:hidden;display:flex}
.tree-wrap svg{width:100%;height:100%}
.sidebar{display:flex;flex-direction:column;gap:6px;flex-shrink:0;width:150px;justify-content:flex-start}
.input-group{display:flex;flex-direction:column;gap:4px;font-size:12px}
.input-row{display:flex;align-items:center;gap:4px}
.input-row input{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);font-size:13px;width:100%;min-width:0}
.enter-hint{font-size:14px;color:var(--slot-stroke);flex-shrink:0}
.btn-row{display:flex;gap:4px}
.gen-btn,.clear-btn{flex:1;padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
.gen-btn{border:1px solid var(--highlight);background:var(--bg);color:var(--highlight)}
.gen-btn:hover{background:#2d3748}
.clear-btn{border:1px solid var(--error-stroke);background:transparent;color:var(--error-stroke)}
.clear-btn:hover{background:var(--error-fill)}
.separator{height:1px;background:var(--border);margin:2px 0}
.controls{display:flex;flex-direction:row;gap:4px;flex-wrap:wrap;justify-content:center}
.controls button{width:36px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--btn-bg);color:var(--btn-text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0}
.controls button:hover:not(:disabled){background:var(--btn-hover)}
.controls button:disabled{opacity:.4;cursor:default}
.controls button.playing{background:var(--error-stroke);color:#1a1b2e;border-color:var(--error-stroke)}
.speed-wrap{display:flex;align-items:center;gap:3px;font-size:11px;flex:1 1 100%;justify-content:center;white-space:nowrap}
.speed-wrap input[type=range]{width:48px;height:4px;accent-color:var(--highlight)}
.legend{display:flex;flex-direction:column;gap:2px;font-size:10px;align-items:flex-start}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:3px;border:1.5px solid;flex-shrink:0}
.legend-dot.in-heap{background:var(--inheap-fill);border-color:var(--inheap-stroke)}
.legend-dot.current{background:var(--active-fill);border-color:var(--active-stroke)}
.legend-dot.out{background:var(--bg);border-color:var(--border)}
.legend-dot.compare{background:var(--compare-fill);border-color:var(--compare-stroke)}
.legend-dot.swap{background:var(--swap-fill);border-color:var(--swap-stroke)}
.info{padding:6px 10px;border:1px solid var(--border);border-radius:6px;width:100%;display:flex;flex-wrap:wrap;gap:3px 12px;align-items:baseline;font-size:12px;flex-shrink:0}
.info .desc{flex:1 1 100%;font-family:menlo,consola,'DejaVu Sans Mono',monospace;font-size:12px;min-height:1.3em;word-break:break-word}
.info .meta{display:flex;gap:12px;flex-wrap:wrap}
.info .meta span{white-space:nowrap}
</style>
</head>
<body>
<div class="applet">
<div class="header">
<span class="title">Heapsort — Visualización paso a paso</span>
<div class="sort-toggle" id="sortToggle">
<button class="sort-btn active" data-dir="asc" title="Orden ascendente (max-heap)">Asc</button>
<button class="sort-btn" data-dir="desc" title="Orden descendente (min-heap)">Desc</button>
</div>
</div>
<div class="main">
<div class="viz-wrap">
<div class="panel" style="flex:0 0 auto">
<div class="panel-label">Arreglo</div>
<div class="arr-row" id="arrRow"></div>
</div>
<div class="panel" style="flex:1;min-height:0">
<div class="panel-label" id="heapLabel">Heap (max-heap)</div>
<div class="tree-wrap"><svg id="treeSvg" xmlns="http://www.w3.org/2000/svg"></svg></div>
</div>
</div>
<div class="sidebar">
<div class="input-group">
<label for="arrInput">Arreglo:</label>
<div class="input-row">
<input type="text" id="arrInput" placeholder="Ej: 5,3,8,1" title="Ingresar entre 1 y 10 números enteros separados por coma" autofocus>
<span class="enter-hint">&#x21B5;</span>
</div>
<div class="btn-row">
<button id="btnGenerate" class="gen-btn" title="Generar un arreglo aleatorio de 10 enteros">Generar</button>
<button id="btnClear" class="clear-btn" title="Limpiar el arreglo y reiniciar la visualización">Limpiar</button>
</div>
</div>
<div class="separator"></div>
<div class="controls">
<button id="btnFirst" title="Ir al primer paso">&#x23EE;</button>
<button id="btnPrev" title="Paso anterior (&#x2190;)">&#x25C0;</button>
<button id="btnNext" title="Paso siguiente (&#x2192;)">&#x25B6;</button>
<button id="btnSkip" title="Reproducir / Pausar animaci&#xF3;n (espacio)">&#x23E9;</button>
</div>
<div class="speed-wrap">
<label for="speedSlider">Vel:</label>
<input type="range" id="speedSlider" min="400" max="3000" value="1500" step="100" title="Velocidad de reproducci&#xF3;n autom&#xE1;tica">
<span id="speedLabel">0.7 p/s</span>
</div>
<div class="separator"></div>
<div class="legend">
<div class="legend-item" title="Dentro del heap actual"><span class="legend-dot in-heap"></span> En heap</div>
<div class="legend-item" title="Nodo siendo procesado (downHeap)"><span class="legend-dot current"></span> Actual</div>
<div class="legend-item" title="Comparaci&#xF3;n de hijos"><span class="legend-dot compare"></span> Compara</div>
<div class="legend-item" title="Intercambio en curso"><span class="legend-dot swap"></span> Swap</div>
<div class="legend-item" title="Fuera del heap (ya ordenado)"><span class="legend-dot out"></span> Fuera</div>
</div>
</div>
</div>
<div class="info">
<div class="desc" id="desc">Ingresar un arreglo de hasta 10 elementos y presionar &#x23CE;.</div>
<div class="meta">
<span id="stepCounter">Paso &#x2014; / &#x2014;</span>
</div>
</div>
</div>
<script>
(function(){
var SVG_NS='http://www.w3.org/2000/svg';
var svg=document.getElementById('treeSvg');
var arrRow=document.getElementById('arrRow');
var descEl=document.getElementById('desc');
var stepEl=document.getElementById('stepCounter');
var arrInput=document.getElementById('arrInput');
var btnGen=document.getElementById('btnGenerate');
var btnClear=document.getElementById('btnClear');
var btnFirst=document.getElementById('btnFirst');
var btnPrev=document.getElementById('btnPrev');
var btnNext=document.getElementById('btnNext');
var btnSkip=document.getElementById('btnSkip');
var speedSlider=document.getElementById('speedSlider');
var speedLabel=document.getElementById('speedLabel');
var heapLabel=document.getElementById('heapLabel');
var sortBtns=document.querySelectorAll('#sortToggle button');

var MAX_N=10;
var originalArr=[];
var steps=[];
var currentStep=-1;
var isPlaying=false;
var playTimer=null;
var speedVal=1500;
var tree=[];
var sortDir='asc';

function cssVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}

function parseInput(s){
  var parts=s.split(',').map(function(x){return x.trim()}).filter(function(x){return x.length>0});
  var nums=[];
  for(var i=0;i<parts.length;i++){
    var n=parseInt(parts[i],10);
    if(!Number.isInteger(n))return null;
    nums.push(n);
  }
  if(nums.length<1||nums.length>MAX_N)return null;
  return nums;
}

function generateRandom(){
  var arr=[];
  for(var i=0;i<MAX_N;i++){var v=Math.floor(Math.random()*41)-20;arr.push(v);}
  return arr;
}

function buildTreeNodes(N){
  var nodes=[];
  for(var i=0;i<N;i++){
    nodes.push({idx:i,left:null,right:null,depth:Math.floor(Math.log2(i+1))});
  }
  // Build recursive tree: each node has left/right pointers to other nodes
  for(var i=0;i<N;i++){
    var lIdx=2*i+1<N?2*i+1:-1;
    var rIdx=2*i+2<N?2*i+2:-1;
    nodes[i].left=lIdx>=0?nodes[lIdx]:null;
    nodes[i].right=rIdx>=0?nodes[rIdx]:null;
  }
  // Count leaves (nodes with no children)
  var leaves=0,maxDepth=0;
  (function countLeaves(n){
    if(!n)return;
    if(!n.left&&!n.right){leaves++;return;}
    countLeaves(n.left);countLeaves(n.right);
  })(nodes[0]);
  (function getDepth(n,d){if(!n)return;if(d>maxDepth)maxDepth=d;getDepth(n.left,d+1);getDepth(n.right,d+1);})(nodes[0],0);
  return{nodes:nodes,root:nodes[0],leaves:leaves,maxDepth:maxDepth};
}

function buildSteps(arr,ascending){
  var N=arr.length;
  var a=arr.slice();
  var out=[];
  var heapSize=N;
  var outSet={};
  var cmpFn=ascending?function(x,y){return x>y;}:function(x,y){return x<y;};
  var heapName=ascending?'max-heap':'min-heap';
  var extremeWord=ascending?'mayor':'menor';
  var heapWord=ascending?'m\u00E1ximo':'m\u00EDnimo';

  function snap(){return a.slice();}
  function snapshotOut(){var r=[];for(var k=0;k<N;k++)if(outSet[k])r.push(k);return r;}
  function pushStep(s){s.out=snapshotOut();s.heapSize=heapSize;out.push(s);}

  pushStep({type:'init',desc:'Arreglo inicial: ['+a.join(', ')+'].',arr:snap(),current:-1,compare:[],swap:[],largest:-1});

  pushStep({type:'heapify_start',desc:'Construcci\u00F3n del heap (heapify, '+heapName+'): downHeap desde n/2-1 hasta 0.',arr:snap(),current:-1,compare:[],swap:[],largest:-1});

  for(var i=Math.floor(N/2)-1;i>=0;i--){
    downHeap(i,N,'heapify');
  }

  pushStep({type:'heapify_done',desc:'Heap construido ('+heapName+'). La ra\u00EDz contiene el '+heapWord+'.',arr:snap(),current:-1,compare:[],swap:[],largest:-1});

  for(var i=N-1;i>0;i--){
    pushStep({type:'extract_swap',desc:'Intercambiar ra\u00EDz (a[0]='+a[0]+') con \u00FAltima hoja (a['+i+']='+a[i]+').',arr:snap(),current:-1,compare:[],swap:[0,i],largest:-1});
    [a[0],a[i]]=[a[i],a[0]];
    pushStep({type:'extract_swapped',desc:'Intercambio realizado.',arr:snap(),current:-1,compare:[],swap:[0,i],largest:-1});

    outSet[i]=true;
    heapSize--;
    pushStep({type:'extract_out',desc:'Posici\u00F3n '+i+' (valor '+a[i]+') fuera del heap.',arr:snap(),current:-1,compare:[],swap:[],largest:-1});

    if(heapSize>1){
      downHeap(0,heapSize,'extract');
    }
  }

  for(var i=0;i<N;i++)outSet[i]=true;
  heapSize=0;
  pushStep({type:'done',desc:'Arreglo ordenado ('+(ascending?'ascendente':'descendente')+'): ['+a.join(', ')+'].',arr:snap(),current:-1,compare:[],swap:[],largest:-1});

  function downHeap(i,n,phase){
    var current=i;
    pushStep({type:'downHeap_start',desc:'downHeap(arreglo, '+n+', '+i+').',arr:snap(),current:current,compare:[],swap:[],largest:-1});

    while(true){
      var left=2*current+1;
      var right=2*current+2;
      if(left>=n){
        pushStep({type:'downHeap_no_children',desc:'a['+current+'] no tiene hijos dentro del heap, downHeap termina.',arr:snap(),current:current,compare:[],swap:[],largest:-1});
        break;
      }
      var largest=current;
      if(right<n){
        pushStep({type:'downHeap_compare',desc:'Comparar hijos: a['+left+']='+a[left]+' y a['+right+']='+a[right]+'.',arr:snap(),current:current,compare:[left,right],swap:[],largest:-1});
        if(cmpFn(a[right],a[largest]))largest=right;
      }
      if(cmpFn(a[left],a[largest]))largest=left;
      pushStep({type:'downHeap_largest',desc:'El '+extremeWord+' es a['+largest+']='+a[largest]+'.',arr:snap(),current:current,compare:[],swap:[],largest:largest});
      if(largest===current){
        pushStep({type:'downHeap_done',desc:'a['+current+']='+a[current]+' es '+extremeWord+' o igual que sus hijos, downHeap termina.',arr:snap(),current:current,compare:[],swap:[],largest:-1});
        break;
      }
      pushStep({type:'downHeap_swap',desc:'Intercambiar a['+current+']='+a[current]+' con a['+largest+']='+a[largest]+'.',arr:snap(),current:current,compare:[current,largest],swap:[],largest:-1});
      [a[current],a[largest]]=[a[largest],a[current]];
      pushStep({type:'downHeap_swapped',desc:'Intercambio realizado: a['+current+']='+a[current]+', a['+largest+']='+a[largest]+'. Continuar bajando.',arr:snap(),current:largest,compare:[],swap:[current,largest],largest:-1});
      current=largest;
    }
  }

  return{steps:out};
}

function downHeap(i,n,phase){
  var current=i;
  pushStep({type:'downHeap_start',desc:'downHeap(arreglo, '+n+', '+i+').',arr:snap(),current:current,compare:[],swap:[],largest:-1});

  while(true){
    var left=2*current+1;
    var right=2*current+2;
    if(left>=n){
      pushStep({type:'downHeap_no_children',desc:'a['+current+'] no tiene hijos dentro del heap, downHeap termina.',arr:snap(),current:current,compare:[],swap:[],largest:-1});
      break;
    }
    var largest=current;
    if(right<n){
      pushStep({type:'downHeap_compare',desc:'Comparar hijos: a['+left+']='+a[left]+' y a['+right+']='+a[right]+'.',arr:snap(),current:current,compare:[left,right],swap:[],largest:-1});
      if(a[right]>a[largest])largest=right;
    }
    if(a[left]>a[largest])largest=left;
    pushStep({type:'downHeap_largest',desc:'El mayor es a['+largest+']='+a[largest]+'.',arr:snap(),current:current,compare:[],swap:[],largest:largest});
    if(largest===current){
      pushStep({type:'downHeap_done',desc:'a['+current+']='+a[current]+' es mayor o igual que sus hijos, downHeap termina.',arr:snap(),current:current,compare:[],swap:[],largest:-1});
      break;
    }
    pushStep({type:'downHeap_swap',desc:'Intercambiar a['+current+']='+a[current]+' con a['+largest+']='+a[largest]+'.',arr:snap(),current:current,compare:[current,largest],swap:[],largest:-1});
    [a[current],a[largest]]=[a[largest],a[current]];
    pushStep({type:'downHeap_swapped',desc:'Intercambio realizado: a['+current+']='+a[current]+', a['+largest+']='+a[largest]+'. Continuar bajando.',arr:snap(),current:largest,compare:[],swap:[current,largest],largest:-1});
    current=largest;
  }
}

function isOut(idx,out){for(var i=0;i<out.length;i++)if(out[i]===idx)return true;return false;}

function renderArrayRow(arr,heapSize,current,compare,swap,largest,out){
  arrRow.innerHTML='';
  if(!arr||arr.length===0)return;
  arr.forEach(function(v,i){
    var cell=document.createElement('div');
    cell.className='arr-cell';
    if(isOut(i,out)){
      cell.classList.add('out');
    }else if(swap.indexOf(i)>=0){
      cell.classList.add('swap');
    }else if(compare.indexOf(i)>=0){
      cell.classList.add('compare');
    }else if(i===current||i===largest){
      cell.classList.add('current');
    }else{
      cell.classList.add('in-heap');
    }
    cell.textContent=v;
    arrRow.appendChild(cell);
  });
}

function drawTree(treeInfo,arr,heapSize,current,compare,swap,largest,out,W,H){
  svg.innerHTML='';
  if(!treeInfo||!treeInfo.root)return;
  var root=treeInfo.root;
  var N=treeInfo.nodes.length;
  var padding=12;
  var usableW=W-2*padding;
  var usableH=H-2*padding;
  var maxDepth=treeInfo.maxDepth;
  var levelH=Math.max(42,Math.min(60,usableH/Math.max(maxDepth+1,1)));

  // Even distribution per level, but last level uses slot positions of a complete binary tree (shifted left)
  var positions={};
  for(var i=0;i<N;i++){
    var d=Math.floor(Math.log2(i+1));
    var startIdx=Math.pow(2,d)-1;
    var nodesAtLevel=Math.min(Math.pow(2,d),N-startIdx);
    var offset=i-startIdx;
    var x;
    if(d===maxDepth){
      // Last level: use slot positions of a complete binary tree (shifted left)
      var maxSlots=Math.pow(2,d);
      x=padding+usableW*(offset+0.5)/maxSlots;
    }else{
      // Other levels: even distribution
      x=padding+usableW*(offset+0.5)/nodesAtLevel;
    }
    positions[i]={
      x:x,
      y:padding+10+d*levelH
    };
  }

  // Draw edges
  (function drawEdges(n){
    if(!n)return;
    drawEdges(n.left);
    drawEdges(n.right);
    if(n.left){
      var line=document.createElementNS(SVG_NS,'line');
      line.setAttribute('x1',positions[n.idx].x);line.setAttribute('y1',positions[n.idx].y+12);
      line.setAttribute('x2',positions[n.left.idx].x);line.setAttribute('y2',positions[n.left.idx].y-12);
      line.setAttribute('stroke',cssVar('--edge'));line.setAttribute('stroke-width','1.5');
      svg.appendChild(line);
    }
    if(n.right){
      var line=document.createElementNS(SVG_NS,'line');
      line.setAttribute('x1',positions[n.idx].x);line.setAttribute('y1',positions[n.idx].y+12);
      line.setAttribute('x2',positions[n.right.idx].x);line.setAttribute('y2',positions[n.right.idx].y-12);
      line.setAttribute('stroke',cssVar('--edge'));line.setAttribute('stroke-width','1.5');
      svg.appendChild(line);
    }
  })(root);

  // Draw nodes (in-order traversal)
  (function drawNodes(n){
    if(!n)return;
    drawNodes(n.left);
    drawNodes(n.right);
    var i=n.idx;
    var pos=positions[i];
    var isOutNode=isOut(i,out);
    var isInHeap=i<heapSize;
    var fill=cssVar('--node-fill');
    var stroke=cssVar('--node-stroke');
    var strokeW=1.5;
    var opacity=1;
    if(isOutNode){fill=cssVar('--bg');stroke=cssVar('--border');opacity=0.4;}
    else if(swap.indexOf(i)>=0){fill=cssVar('--swap-fill');stroke=cssVar('--swap-stroke');strokeW=2;}
    else if(compare.indexOf(i)>=0){fill=cssVar('--compare-fill');stroke=cssVar('--compare-stroke');strokeW=2;}
    else if(i===current||i===largest){fill=cssVar('--active-fill');stroke=cssVar('--active-stroke');strokeW=2;}
    else if(isInHeap){fill=cssVar('--inheap-fill');stroke=cssVar('--inheap-stroke');}

    var s=arr[i].toString();
    var nodeW=Math.max(28,Math.min(60,s.length*7+14));
    var nodeH=24;
    var g=document.createElementNS(SVG_NS,'g');
    g.setAttribute('opacity',opacity);
    var titleText='a['+i+']='+arr[i]+(isOutNode?' (fuera del heap)':'');
    var titleEl=document.createElementNS(SVG_NS,'title');
    titleEl.textContent=titleText;
    g.appendChild(titleEl);
    var rect=document.createElementNS(SVG_NS,'rect');
    rect.setAttribute('x',pos.x-nodeW/2);rect.setAttribute('y',pos.y-nodeH/2);
    rect.setAttribute('width',nodeW);rect.setAttribute('height',nodeH);
    rect.setAttribute('rx',3);rect.setAttribute('fill',fill);rect.setAttribute('stroke',stroke);
    rect.setAttribute('stroke-width',strokeW);
    g.appendChild(rect);
    svg.appendChild(g);

    var txt=document.createElementNS(SVG_NS,'text');
    txt.setAttribute('x',pos.x);txt.setAttribute('y',pos.y);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-family','monospace');txt.setAttribute('font-size','11');
    txt.setAttribute('font-weight','600');txt.setAttribute('fill',cssVar('--node-text'));
    txt.textContent=arr[i];
    g.appendChild(txt);

    if(!isOutNode){
      var idxTxt=document.createElementNS(SVG_NS,'text');
      idxTxt.setAttribute('x',pos.x);idxTxt.setAttribute('y',pos.y-nodeH/2-7);
      idxTxt.setAttribute('text-anchor','middle');
      idxTxt.setAttribute('font-family','monospace');idxTxt.setAttribute('font-size','8');
      idxTxt.setAttribute('fill',cssVar('--idx-text'));
      idxTxt.textContent='['+i+']';
      g.appendChild(idxTxt);
    }
  })(root);

  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
}


function render(idx){
  if(steps.length===0){
    arrRow.innerHTML='';
    svg.innerHTML='';
    descEl.textContent='Ingresar un arreglo de hasta 10 elementos y presionar \u23CE.';
    stepEl.textContent='Paso \u2014 / \u2014';
    updateBtns();
    return;
  }
  if(idx<0||idx>=steps.length){
    descEl.textContent='';stepEl.textContent='Paso \u2014 / '+steps.length;updateBtns();return;
  }
  var s=steps[idx];
  renderArrayRow(s.arr,s.heapSize,s.current,s.compare,s.swap,s.largest,s.out);

  var rect=svg.parentElement.getBoundingClientRect();
  var W=Math.max(rect.width,300);
  var H=Math.max(rect.height,180);
  var treeInfo=buildTreeNodes(s.arr.length);
  drawTree(treeInfo,s.arr,s.heapSize,s.current,s.compare,s.swap,s.largest,s.out,W,H);

  descEl.textContent=s.desc;
  stepEl.textContent='Paso '+(idx+1)+' / '+steps.length;
  updateBtns();
}

function updateBtns(){
  var atS=currentStep<=0,atE=currentStep>=steps.length-1,hasS=steps.length>0;
  btnFirst.disabled=atS||!hasS||isPlaying;
  btnPrev.disabled=atS||!hasS||isPlaying;
  btnNext.disabled=!hasS||atE||isPlaying;
  btnSkip.disabled=!hasS||(atE&&!isPlaying);
}

function goTo(n){n=Math.max(0,Math.min(n,steps.length-1));currentStep=n;render(n);}
function goNext(){if(currentStep<steps.length-1)goTo(currentStep+1);}
function goPrev(){if(currentStep>0)goTo(currentStep-1);}
function goFirst(){stopPlay();goTo(0);}

function tick(){if(!isPlaying)return;if(currentStep>=steps.length-1){stopPlay();return;}goNext();if(isPlaying)playTimer=setTimeout(tick,speedVal);}
function startPlay(){if(currentStep>=steps.length-1)goFirst();isPlaying=true;btnSkip.textContent='\u23F8';btnSkip.classList.add('playing');updateBtns();playTimer=setTimeout(tick,speedVal);}
function stopPlay(){isPlaying=false;if(playTimer){clearTimeout(playTimer);playTimer=null;}btnSkip.textContent='\u23E9';btnSkip.classList.remove('playing');updateBtns();}
function hdlSkip(){if(isPlaying){stopPlay();return;}if(currentStep>=steps.length-1)goFirst();startPlay();}

function loadArray(arr){
  stopPlay();
  originalArr=arr.slice();
  var built=buildSteps(arr,sortDir==='asc');
  steps=built.steps;
  heapLabel.textContent='Heap ('+(sortDir==='asc'?'max':'min')+'-heap)';
  currentStep=steps.length>0?0:-1;
  render(currentStep);
}

function tryLoadFromInput(){
  var v=arrInput.value.trim();
  if(v.length===0)return;
  var nums=parseInput(v);
  if(nums===null){
    descEl.textContent='\u26A0 Ingresar entre 1 y '+MAX_N+' n\u00FAmeros enteros separados por coma.';
    return;
  }
  loadArray(nums);
  arrInput.value='';
  arrInput.focus();
}

btnGen.addEventListener('click',function(){
  var arr=generateRandom();
  arrInput.value=arr.join(',');
  loadArray(arr);
});
sortBtns.forEach(function(b){
  b.addEventListener('click',function(){
    if(isPlaying)return;
    if(sortDir===b.dataset.dir)return;
    sortBtns.forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    sortDir=b.dataset.dir;
    if(originalArr.length>0)loadArray(originalArr);
  });
});
btnClear.addEventListener('click',function(){
  stopPlay();
  originalArr=[];
  steps=[];
  currentStep=-1;
  arrInput.value='';
  arrInput.focus();
  render(-1);
});
arrInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();tryLoadFromInput();}});
btnFirst.addEventListener('click',goFirst);
btnPrev.addEventListener('click',goPrev);
btnNext.addEventListener('click',goNext);
btnSkip.addEventListener('click',hdlSkip);
speedSlider.addEventListener('input',function(){speedVal=3400-parseInt(this.value,10);speedLabel.textContent=(1000/speedVal).toFixed(1)+' p/s';if(isPlaying){stopPlay();startPlay();}});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'){e.preventDefault();goNext();}
  if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
  if(e.key==='Home'){e.preventDefault();goFirst();}
  if(e.key===' '||e.key==='End'){e.preventDefault();hdlSkip();}
});

window.addEventListener('load',function(){
  speedLabel.textContent=(1000/speedVal).toFixed(1)+' p/s';
  render(-1);
});
window.addEventListener('resize',function(){if(currentStep>=0)render(currentStep);});
})();
</script>
</body>
</html>

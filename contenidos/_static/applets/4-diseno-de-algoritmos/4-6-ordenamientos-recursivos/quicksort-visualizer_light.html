<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quicksort — Visualizador</title>
<style>
:root{
  --bg:#ffffff;--fg:#1a1a2e;--border:#d1d5db;
  --btn-bg:#f3f4f6;--btn-hover:#e5e7eb;--btn-text:#374151;
  --node-fill:#e1f5ff;--node-stroke:#4682b4;
  --active-fill:#fff3cd;--active-stroke:#f59e0b;
  --done-fill:#d4edda;--done-stroke:#28a745;
  --compare-fill:#ffe1e1;--compare-stroke:#e9967a;
  --swap-fill:#fef9c3;--swap-stroke:#eab308;
  --pivot-fill:#f3e8ff;--pivot-stroke:#9333ea;
  --subrange-fill:#e0e7ff;--subrange-stroke:#6366f1;
  --ptr-fill:#1d4ed8;--ptr-text:#ffffff;
  --panel-bg:#fafafa;
  --highlight:#1d4ed8;--error-stroke:#e9967a;--error-fill:#ffe1e1;
  --slot-stroke:#9ca3af;
  --node-text:#1a1a2e;
  --pivot-text:#6b21a8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.applet{display:flex;flex-direction:column;padding:8px;gap:6px;width:100%;max-width:100%;margin:0 auto;flex:1;min-height:0;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--btn-bg);border-radius:6px;border:1px solid var(--border);width:100%;flex-shrink:0;gap:8px}
.header .title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sort-toggle{display:flex;gap:2px;flex-shrink:0}
.sort-toggle button{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--btn-bg);color:var(--btn-text);font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
.sort-toggle button.active{background:var(--highlight);color:#fff;border-color:var(--highlight)}
.sort-toggle button:hover:not(.active){background:var(--btn-hover)}
.main{display:flex;flex:1;min-height:0;gap:8px;width:100%;overflow:hidden}
.viz-wrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.panel{border:1px solid var(--border);border-radius:6px;padding:6px 8px;background:var(--panel-bg);display:flex;flex-direction:column;gap:4px;min-height:0;justify-content:center}
.panel-label{font-size:11px;font-weight:700;color:var(--tree-text);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.arr-display{display:flex;justify-content:center;align-items:flex-start;gap:4px;flex-wrap:wrap;padding:8px 4px;min-height:80px}
.cell-col{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:38px}
.ptr-label{font-size:10px;color:var(--ptr-fill);font-weight:700;font-family:monospace;height:14px;line-height:1;letter-spacing:.5px}
.ptr-label .pivot-label{color:var(--pivot-text)}
.arr-cell{width:36px;height:36px;border:2px solid var(--node-stroke);background:var(--node-fill);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:menlo,consola,'DejaVu Sans Mono',monospace;font-size:13px;font-weight:600;color:var(--node-text);position:relative;transition:background .15s,border-color .15s}
.arr-cell.faded{background:var(--bg);border-color:var(--border);color:var(--slot-stroke);opacity:0.5}
.arr-cell.in-subrange{background:var(--subrange-fill);border-color:var(--subrange-stroke)}
.arr-cell.pivot{background:var(--pivot-fill);border-color:var(--pivot-stroke);color:var(--pivot-text);font-weight:700}
.arr-cell.swap{background:var(--swap-fill);border-color:var(--swap-stroke)}
.arr-cell.compare{background:var(--compare-fill);border-color:var(--compare-stroke)}
.arr-cell.sorted{background:var(--done-fill);border-color:var(--done-stroke);color:#065f46}
.arr-cell.ptr-i{box-shadow:0 0 0 2px var(--ptr-fill) inset}
.arr-cell.ptr-j{box-shadow:0 0 0 2px var(--ptr-fill) inset}
.arr-cell.ptr-ij{box-shadow:0 0 0 2px var(--ptr-fill) inset,0 0 0 4px var(--pivot-stroke) inset}
.sidebar{display:flex;flex-direction:column;gap:6px;flex-shrink:0;width:150px;justify-content:flex-start}
.input-group{display:flex;flex-direction:column;gap:4px;font-size:12px}
.input-row{display:flex;align-items:center;gap:4px}
.input-row input{flex:1;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--fg);font-size:13px;width:100%;min-width:0}
.enter-hint{font-size:14px;color:var(--slot-stroke);flex-shrink:0}
.btn-row{display:flex;gap:4px}
.gen-btn,.clear-btn{flex:1;padding:4px 6px;border-radius:4px;font-size:11px;cursor:pointer;font-weight:600;transition:background .15s}
.gen-btn{border:1px solid var(--highlight);background:var(--bg);color:var(--highlight)}
.gen-btn:hover{background:var(--node-fill)}
.clear-btn{border:1px solid var(--error-stroke);background:transparent;color:var(--error-stroke)}
.clear-btn:hover{background:var(--error-fill)}
.separator{height:1px;background:var(--border);margin:2px 0}
.controls{display:flex;flex-direction:row;gap:4px;flex-wrap:wrap;justify-content:center}
.controls button{width:36px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--btn-bg);color:var(--btn-text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0}
.controls button:hover:not(:disabled){background:var(--btn-hover)}
.controls button:disabled{opacity:.4;cursor:default}
.controls button.playing{background:var(--error-stroke);color:#1a1b2e;border-color:var(--error-stroke)}
.speed-wrap{display:flex;align-items:center;gap:3px;font-size:11px;flex:1 1 100%;justify-content:center;white-space:nowrap}
.speed-wrap input[type=range]{width:48px;height:4px;accent-color:var(--highlight)}
.legend{display:flex;flex-direction:column;gap:2px;font-size:10px;align-items:flex-start}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:12px;height:12px;border-radius:3px;border:1.5px solid;flex-shrink:0}
.legend-dot.faded{background:var(--bg);border-color:var(--border)}
.legend-dot.in-subrange{background:var(--subrange-fill);border-color:var(--subrange-stroke)}
.legend-dot.sorted{background:var(--done-fill);border-color:var(--done-stroke)}
.legend-dot.pivot{background:var(--pivot-fill);border-color:var(--pivot-stroke)}
.legend-dot.compare{background:var(--compare-fill);border-color:var(--compare-stroke)}
.legend-dot.swap{background:var(--swap-fill);border-color:var(--swap-stroke)}
.info{padding:6px 10px;border:1px solid var(--border);border-radius:6px;width:100%;display:flex;flex-wrap:wrap;gap:3px 12px;align-items:baseline;font-size:12px;flex-shrink:0}
.info .desc{flex:1 1 100%;font-family:menlo,consola,'DejaVu Sans Mono',monospace;font-size:12px;min-height:1.3em;word-break:break-word}
.info .meta{display:flex;gap:12px;flex-wrap:wrap}
.info .meta span{white-space:nowrap}
</style>
</head>
<body>
<div class="applet">
<div class="header">
<span class="title">Quicksort — Visualización paso a paso</span>
<div class="sort-toggle" id="sortToggle">
<button class="sort-btn active" data-dir="asc" title="Orden ascendente">Asc</button>
<button class="sort-btn" data-dir="desc" title="Orden descendente">Desc</button>
</div>
</div>
<div class="main">
<div class="viz-wrap">
<div class="panel array-panel" style="flex:1;min-height:0">
<div class="panel-label">Arreglo</div>
<div class="arr-display" id="arrDisplay"></div>
</div>
</div>
<div class="sidebar">
<div class="input-group">
<label for="arrInput">Arreglo:</label>
<div class="input-row">
<input type="text" id="arrInput" placeholder="Ej: 5,3,8,1" title="Ingresar entre 1 y 10 números enteros separados por coma" autofocus>
<span class="enter-hint">&#x21B5;</span>
</div>
<div class="btn-row">
<button id="btnGenerate" class="gen-btn" title="Generar un arreglo aleatorio de 10 enteros">Generar</button>
<button id="btnClear" class="clear-btn" title="Limpiar el arreglo y reiniciar la visualización">Limpiar</button>
</div>
</div>
<div class="separator"></div>
<div class="controls">
<button id="btnFirst" title="Ir al primer paso">&#x23EE;</button>
<button id="btnPrev" title="Paso anterior (&#x2190;)">&#x25C0;</button>
<button id="btnNext" title="Paso siguiente (&#x2192;)">&#x25B6;</button>
<button id="btnSkip" title="Reproducir / Pausar animaci&#xF3;n (espacio)">&#x23E9;</button>
</div>
<div class="speed-wrap">
<label for="speedSlider">Vel:</label>
<input type="range" id="speedSlider" min="400" max="3000" value="1500" step="100" title="Velocidad de reproducci&#xF3;n autom&#xE1;tica">
<span id="speedLabel">0.7 p/s</span>
</div>
<div class="separator"></div>
<div class="legend">
<div class="legend-item" title="Fuera del subrango actual"><span class="legend-dot faded"></span> Fuera</div>
<div class="legend-item" title="Dentro del subrango en partici&#xF3;n"><span class="legend-dot in-subrange"></span> Subrango</div>
<div class="legend-item" title="Subarreglo ya ordenado"><span class="legend-dot sorted"></span> Ordenado</div>
<div class="legend-item" title="Elemento pivote"><span class="legend-dot pivot"></span> Pivote</div>
<div class="legend-item" title="Violaci&#xF3;n de condici&#xF3;n de scan"><span class="legend-dot compare"></span> Frena</div>
<div class="legend-item" title="Intercambio en curso"><span class="legend-dot swap"></span> Swap</div>
</div>
</div>
</div>
<div class="info">
<div class="desc" id="desc">Ingresar un arreglo de hasta 10 elementos y presionar &#x23CE;.</div>
<div class="meta">
<span id="stepCounter">Paso &#x2014; / &#x2014;</span>
</div>
</div>
</div>
<script>
(function(){
var arrDisplay=document.getElementById('arrDisplay');
var descEl=document.getElementById('desc');
var stepEl=document.getElementById('stepCounter');
var arrInput=document.getElementById('arrInput');
var btnGen=document.getElementById('btnGenerate');
var btnClear=document.getElementById('btnClear');
var btnFirst=document.getElementById('btnFirst');
var btnPrev=document.getElementById('btnPrev');
var btnNext=document.getElementById('btnNext');
var btnSkip=document.getElementById('btnSkip');
var speedSlider=document.getElementById('speedSlider');
var speedLabel=document.getElementById('speedLabel');
var sortBtns=document.querySelectorAll('#sortToggle button');

var MAX_N=10;
var originalArr=[];
var steps=[];
var currentStep=-1;
var isPlaying=false;
var playTimer=null;
var speedVal=1500;
var sortDir='asc';

function parseInput(s){
  var parts=s.split(',').map(function(x){return x.trim()}).filter(function(x){return x.length>0});
  var nums=[];
  for(var i=0;i<parts.length;i++){
    var n=parseInt(parts[i],10);
    if(!Number.isInteger(n))return null;
    nums.push(n);
  }
  if(nums.length<1||nums.length>MAX_N)return null;
  return nums;
}

function generateRandom(){
  var arr=[];
  for(var i=0;i<MAX_N;i++){var v=Math.floor(Math.random()*41)-20;arr.push(v);}
  return arr;
}

function isInSortedRange(i,sortedRanges){
  for(var k=0;k<sortedRanges.length;k++){
    if(i>=sortedRanges[k].l&&i<=sortedRanges[k].r)return true;
  }
  return false;
}

function buildSteps(arr,ascending){
  var N=arr.length;
  var a=arr.slice();
  var out=[];
  var sortedRanges=[];
  var pivotIdx=-1;

  function markRangeSorted(l,r){
    if(l>r)return;
    sortedRanges.push({l:l,r:r});
    sortedRanges.sort(function(x,y){return x.l-y.l;});
    var merged=[sortedRanges[0]];
    for(var i=1;i<sortedRanges.length;i++){
      if(merged[merged.length-1].r+1>=sortedRanges[i].l){
        merged[merged.length-1].r=Math.max(merged[merged.length-1].r,sortedRanges[i].r);
      }else{
        merged.push(sortedRanges[i]);
      }
    }
    sortedRanges=merged;
  }

  function snap(){return a.slice();}
  function snapshotSorted(){return sortedRanges.map(function(r){return{l:r.l,r:r.r};});}
  function pushStep(s){s.sortedRanges=snapshotSorted();out.push(s);}

  var cmpLE=ascending?function(x,y){return x<=y;}:function(x,y){return x>=y;};
  var cmpGE=ascending?function(x,y){return x>=y;}:function(x,y){return x<=y;};
  var cmpText=ascending?'<=':'>=';
  var cmpTextStop=ascending?'>':'<';

  pushStep({type:'init',desc:'Arreglo inicial: ['+a.join(', ')+'].',arr:snap(),subrange:null,pointers:null});

  function quicksort(l,r){
    pushStep({type:'call',desc:'Quicksort(arreglo['+l+'..'+r+']) \u2014 longitud='+(r-l+1),arr:snap(),subrange:{l:l,r:r},pointers:null});

    if(l>=r){
      if(l===r)markRangeSorted(l,r);
      pushStep({type:'base',desc:'Caso base: inicio >= fin, retornar.',arr:snap(),subrange:{l:l,r:r},pointers:null});
      return;
    }

    particionar(l,r);
    var pp=pivotIdx;

    quicksort(l,pp-1);
    quicksort(pp+1,r);

    markRangeSorted(l,r);
    pushStep({type:'return',desc:'Retornar de Quicksort('+l+'..'+r+').',arr:snap(),subrange:{l:l,r:r},pointers:null});
  }

  function particionar(l,r){
    var medio=Math.floor((l+r)/2);
    var pivoteValor=a[medio];

    pushStep({type:'select_pivot',desc:'Pivote: medio=('+l+'+'+r+')/2='+medio+', arreglo['+medio+']='+pivoteValor+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:medio,pivotVal:pivoteValor,i:l,j:r-1,hl:'pivot'}});

    [a[medio],a[r]]=[a[r],a[medio]];
    pushStep({type:'move_pivot',desc:'Intercambiar arreglo['+medio+'] con arreglo['+r+'] (mover pivote al final).',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:l,j:r-1,hl:'pivot_moved'}});

    var i=l;
    var j=r-1;
    pushStep({type:'init_pointers',desc:'i='+i+', j='+j+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'init'}});

    while(i<=j){
      while(i<=j&&cmpLE(a[i],pivoteValor)){
        pushStep({type:'scan_left',desc:'arreglo['+i+']='+a[i]+' '+cmpText+' pivote('+pivoteValor+'), avanzar i='+(i+1)+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'scan_i'}});
        i++;
      }
      if(i<=j){
        pushStep({type:'stop_left',desc:'arreglo['+i+']='+a[i]+' '+cmpTextStop+' pivote('+pivoteValor+'), detener i en '+i+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'stop_i'}});
      }

      while(i<=j&&cmpGE(a[j],pivoteValor)){
        pushStep({type:'scan_right',desc:'arreglo['+j+']='+a[j]+' '+cmpTextStop+' pivote('+pivoteValor+'), retroceder j='+(j-1)+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'scan_j'}});
        j--;
      }
      if(i<=j){
        pushStep({type:'stop_right',desc:'arreglo['+j+']='+a[j]+' '+cmpText+' pivote('+pivoteValor+'), detener j en '+j+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'stop_j'}});
      }

      if(i<j){
        pushStep({type:'swap',desc:'i < j, intercambiar arreglo['+i+']='+a[i]+' y arreglo['+j+']='+a[j]+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'swap'}});
        [a[i],a[j]]=[a[j],a[i]];
        pushStep({type:'after_swap',desc:'Intercambio realizado: arreglo['+i+']='+a[i]+', arreglo['+j+']='+a[j]+'. Avanzar i='+(i+1)+', j='+(j-1)+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i+1,j:j-1,hl:'after_swap'}});
        i++;
        j--;
      }else{
        pushStep({type:'cross',desc:(i===j?'i ('+i+') == j ('+j+')':'i ('+i+') > j ('+j+')')+', salir del bucle.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:r,pivotVal:pivoteValor,i:i,j:j,hl:'cross'}});
        break;
      }
    }

    [a[i],a[r]]=[a[r],a[i]];
    pivotIdx=i;
    pushStep({type:'pivot_place',desc:'Intercambiar arreglo['+i+'] con arreglo['+r+'] (pivote). Pivote en posici\u00F3n final '+i+'.',arr:snap(),subrange:{l:l,r:r},pointers:{pivotIdx:i,pivotVal:pivoteValor,i:i,j:j,hl:'pivot_place'}});
  }

  quicksort(0,N-1);

  pushStep({type:'done',desc:'Arreglo ordenado ('+(ascending?'ascendente':'descendente')+'): ['+a.join(', ')+'].',arr:snap(),subrange:null,pointers:null});

  return{steps:out};
}

function render(idx){
  if(steps.length===0){
    arrDisplay.innerHTML='<div style="color:var(--slot-stroke);font-size:12px">Ingresar un arreglo de hasta 10 elementos y presionar &#x23CE;.</div>';
    descEl.textContent='Ingresar un arreglo de hasta 10 elementos y presionar \u23CE.';
    stepEl.textContent='Paso \u2014 / \u2014';
    updateBtns();
    return;
  }
  if(idx<0||idx>=steps.length){
    descEl.textContent='';stepEl.textContent='Paso \u2014 / '+steps.length;updateBtns();return;
  }
  var s=steps[idx];
  renderArray(s.arr,s.subrange,s.pointers,s.sortedRanges);
  descEl.textContent=s.desc;
  stepEl.textContent='Paso '+(idx+1)+' / '+steps.length;
  updateBtns();
}

function renderArray(arr,subrange,pointers,sortedRanges){
  arrDisplay.innerHTML='';
  if(!arr||arr.length===0)return;
  for(var i=0;i<arr.length;i++){
    var col=document.createElement('div');
    col.className='cell-col';

    var ptrLabel=document.createElement('div');
    ptrLabel.className='ptr-label';
    var parts=[];
    var isPivot=(pointers&&pointers.pivotIdx===i);
    var isI=(pointers&&pointers.i===i);
    var isJ=(pointers&&pointers.j===i);
    if(isI)parts.push('<span title="puntero i">\u2193i</span>');
    if(isJ)parts.push('<span title="puntero j">\u2193j</span>');
    if(isPivot&&(pointers.hl==='pivot'||pointers.hl==='pivot_moved'))parts.push('<span class="pivot-label" title="pivote">p</span>');
    ptrLabel.innerHTML=parts.join(' ');
    col.appendChild(ptrLabel);

    var cell=document.createElement('div');
    cell.className='arr-cell';
    if(sortedRanges&&isInSortedRange(i,sortedRanges)){
      cell.classList.add('sorted');
    }else if(subrange&&i>=subrange.l&&i<=subrange.r){
      cell.classList.add('in-subrange');
    }else{
      cell.classList.add('faded');
    }
    if(isPivot)cell.classList.add('pivot');
    if(pointers){
      if(pointers.hl==='swap'||pointers.hl==='after_swap'){
        if(isI||isJ)cell.classList.add('swap');
      }
      if(pointers.hl==='stop_i'&&isI)cell.classList.add('compare');
      if(pointers.hl==='stop_j'&&isJ)cell.classList.add('compare');
      if(pointers.hl==='scan_i'&&isI)cell.classList.add('ptr-i');
      else if(isI)cell.classList.add('ptr-i');
      if(pointers.hl==='scan_j'&&isJ)cell.classList.add('ptr-j');
      else if(isJ)cell.classList.add('ptr-j');
    }
    cell.textContent=arr[i];
    col.appendChild(cell);

    arrDisplay.appendChild(col);
  }
}

function updateBtns(){
  var atS=currentStep<=0,atE=currentStep>=steps.length-1,hasS=steps.length>0;
  btnFirst.disabled=atS||!hasS||isPlaying;
  btnPrev.disabled=atS||!hasS||isPlaying;
  btnNext.disabled=!hasS||atE||isPlaying;
  btnSkip.disabled=!hasS||(atE&&!isPlaying);
}

function goTo(n){n=Math.max(0,Math.min(n,steps.length-1));currentStep=n;render(n);}
function goNext(){if(currentStep<steps.length-1)goTo(currentStep+1);}
function goPrev(){if(currentStep>0)goTo(currentStep-1);}
function goFirst(){stopPlay();goTo(0);}

function tick(){if(!isPlaying)return;if(currentStep>=steps.length-1){stopPlay();return;}goNext();if(isPlaying)playTimer=setTimeout(tick,speedVal);}
function startPlay(){if(currentStep>=steps.length-1)goFirst();isPlaying=true;btnSkip.textContent='\u23F8';btnSkip.classList.add('playing');updateBtns();playTimer=setTimeout(tick,speedVal);}
function stopPlay(){isPlaying=false;if(playTimer){clearTimeout(playTimer);playTimer=null;}btnSkip.textContent='\u23E9';btnSkip.classList.remove('playing');updateBtns();}
function hdlSkip(){if(isPlaying){stopPlay();return;}if(currentStep>=steps.length-1)goFirst();startPlay();}

function loadArray(arr){
  stopPlay();
  originalArr=arr.slice();
  var built=buildSteps(arr,sortDir==='asc');
  steps=built.steps;
  currentStep=steps.length>0?0:-1;
  render(currentStep);
}

function tryLoadFromInput(){
  var v=arrInput.value.trim();
  if(v.length===0)return;
  var nums=parseInput(v);
  if(nums===null){
    descEl.textContent='\u26A0 Ingresar entre 1 y '+MAX_N+' n\u00FAmeros enteros separados por coma.';
    return;
  }
  loadArray(nums);
  arrInput.value='';
  arrInput.focus();
}

sortBtns.forEach(function(b){
  b.addEventListener('click',function(){
    if(isPlaying)return;
    if(sortDir===b.dataset.dir)return;
    sortBtns.forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    sortDir=b.dataset.dir;
    if(originalArr.length>0)loadArray(originalArr);
  });
});

btnGen.addEventListener('click',function(){
  var arr=generateRandom();
  arrInput.value=arr.join(',');
  loadArray(arr);
});
btnClear.addEventListener('click',function(){
  stopPlay();
  originalArr=[];
  steps=[];
  currentStep=-1;
  arrInput.value='';
  arrInput.focus();
  render(-1);
});
arrInput.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();tryLoadFromInput();}});
btnFirst.addEventListener('click',goFirst);
btnPrev.addEventListener('click',goPrev);
btnNext.addEventListener('click',goNext);
btnSkip.addEventListener('click',hdlSkip);
speedSlider.addEventListener('input',function(){speedVal=3400-parseInt(this.value,10);speedLabel.textContent=(1000/speedVal).toFixed(1)+' p/s';if(isPlaying){stopPlay();startPlay();}});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'){e.preventDefault();goNext();}
  if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
  if(e.key==='Home'){e.preventDefault();goFirst();}
  if(e.key===' '||e.key==='End'){e.preventDefault();hdlSkip();}
});

window.addEventListener('load',function(){
  speedLabel.textContent=(1000/speedVal).toFixed(1)+' p/s';
  render(-1);
});
window.addEventListener('resize',function(){if(currentStep>=0)render(currentStep);});
})();
</script>
</body>
</html>

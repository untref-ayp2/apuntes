<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4.2" refX="6" refY="2.1" orient="auto">
      <polygon points="0 0, 6 2.1, 0 4.2" fill="#333333" />
    </marker>
  </defs>

  <!-- Backgrounds for areas -->
  <rect x="20" y="50" width="160" height="300" rx="10" fill="#f8f9fa" stroke="#dddddd" stroke-width="1" />
  <rect x="200" y="50" width="380" height="300" rx="10" fill="#f8f9fa" stroke="#dddddd" stroke-width="1" />

  <!-- Labels for areas -->
  <text x="100" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Stack</text>
  <text x="390" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Heap</text>

  <!-- Variables in Stack -->
  <rect x="40" y="80" width="120" height="40" rx="5" fill="#e6f4ea" stroke="#8fbc8f" stroke-width="2" />
  <text x="100" y="105" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Variable A</text>

  <rect x="40" y="150" width="120" height="40" rx="5" fill="#e6f4ea" stroke="#8fbc8f" stroke-width="2" />
  <text x="100" y="175" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Variable B</text>

  <!-- Reachable Objects in Heap -->
  <rect x="240" y="80" width="100" height="40" rx="5" fill="#e1f5ff" stroke="#4682b4" stroke-width="2" />
  <text x="290" y="105" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 1</text>

  <rect x="440" y="80" width="100" height="40" rx="5" fill="#e1f5ff" stroke="#4682b4" stroke-width="2" />
  <text x="490" y="105" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 2</text>

  <rect x="240" y="150" width="100" height="40" rx="5" fill="#e1f5ff" stroke="#4682b4" stroke-width="2" />
  <text x="290" y="175" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 3</text>

  <!-- Unreachable Objects in Heap (Light Red) -->
  <rect x="440" y="220" width="100" height="40" rx="5" fill="#ffe1e1" stroke="#e9967a" stroke-width="2" />
  <text x="490" y="245" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 4</text>

  <rect x="240" y="280" width="100" height="40" rx="5" fill="#ffe1e1" stroke="#e9967a" stroke-width="2" />
  <text x="290" y="305" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 5</text>

  <rect x="440" y="280" width="100" height="40" rx="5" fill="#ffe1e1" stroke="#e9967a" stroke-width="2" />
  <text x="490" y="305" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#333333" text-anchor="middle">Objeto 6</text>

  <!-- Arrows (Manhattan routing style) -->
  <!-- Var A -> Obj 1 -->
  <path d="M 160 100 L 230 100" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Obj 1 -> Obj 2 -->
  <path d="M 340 100 L 430 100" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Var B -> Obj 3 -->
  <path d="M 160 170 L 230 170" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Obj 5 -> Obj 6 -->
  <path d="M 340 300 L 430 300" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="4" />

  <!-- Legend / Notes -->
  <circle cx="230" cy="370" r="6" fill="#e1f5ff" stroke="#4682b4" stroke-width="2" />
  <text x="245" y="375" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#333333">Accesible</text>

  <circle cx="340" cy="370" r="6" fill="#ffe1e1" stroke="#e9967a" stroke-width="2" />
  <text x="355" y="375" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#333333">Para recolectar</text>

</svg>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 700 420"
   version="1.1"
   id="svg17"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs1">
    <style
       id="style1">
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; text-anchor: middle; fill: #e0e0e0; }
      .subtitle { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #a0a0a0; }
      .code { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 14px; fill: #e0e0e0; text-anchor: middle; }
      .code-label { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 16px; fill: #e0e0e0; text-anchor: middle; font-weight: bold; }
      .box-fn { fill: #2d3748; stroke: #63b3ed; stroke-width: 2; rx: 8; }
      .box-instance { fill: #285e61; stroke: #68d391; stroke-width: 2; rx: 8; }
      .box-param { fill: #744210; stroke: #f6ad55; stroke-width: 2; rx: 6; }
      .arrow { stroke: #e0e0e0; stroke-width: 2; marker-end: url(#arrowhead); }
      .note { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; fill: #a0a0a0; text-anchor: middle; font-style: italic; }
      .tag { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; fill: #63b3ed; text-anchor: middle; }
    </style>
    <marker
       id="arrowhead"
       markerWidth="6"
       markerHeight="5"
       refX="6"
       refY="2.5"
       orient="auto">
      <polygon
         points="0 0, 6 2.5, 0 5"
         fill="#e0e0e0"
         id="polygon1" />
    </marker>
  </defs>
  <!-- Fondo -->
  <rect
     width="700"
     height="420"
     fill="#1e1e1e"
     rx="10"
     id="rect1" />
  <!-- Título -->
  <text
     x="350"
     y="35"
     class="title"
     id="text1">Tipos Parametrizables (genéricos)</text>
  <!-- Función genérica -->
  <rect
     x="100"
     y="60"
     width="500"
     height="65"
     class="box-fn"
     id="rect2" />
  <text
     x="350"
     y="85"
     class="code-label"
     id="text2">Contiene[T comparable]</text>
  <text
     x="350"
     y="108"
     class="code"
     id="text3">func Contiene[T comparable](arr []T, elem T) bool</text>
  <!-- Flecha hacia instancias -->
  <line
     x1="200"
     y1="125"
     x2="200"
     y2="175"
     class="arrow"
     id="line3" />
  <line
     x1="350"
     y1="125"
     x2="350"
     y2="175"
     class="arrow"
     id="line4" />
  <line
     x1="500"
     y1="125"
     x2="500"
     y2="175"
     class="arrow"
     id="line5" />
  <!-- Instancia con int -->
  <g
     id="g20">
    <rect
       x="34.133499"
       y="180.1335"
       width="309.81171"
       height="99.811729"
       class="box-instance"
       id="rect9-9"
       style="fill:#285e61;stroke:#68d391;stroke-width:2.26701" />
    <g
       id="g17"

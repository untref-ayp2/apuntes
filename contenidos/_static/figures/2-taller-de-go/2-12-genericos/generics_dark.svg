        <rect
           x="100.19694"
           y="200.19693"
           width="101.95907"
           height="23.606129"
           class="box-param"
           id="rect6" />
        <text
           x="151.36006"
           y="216"
           class="code-label"
           id="text6">T = int</text>
      </g>
    </g>
    <text
       x="190"
       y="232.58105"
       class="code"
       id="text7">Contiene[int]</text>
    <text
       x="190"
       y="252"
       class="code"
       id="text8">func(arr []int, elem int) bool</text>
    <text
       x="190"
       y="270"
       class="note"
       id="text9">Busca en un slice de enteros</text>
  </g>
  <!-- Instancia con string -->
  <g
     id="g19">
    <rect
       x="355.08047"
       y="180.1335"
       width="309.81171"
       height="99.811729"
       class="box-instance"
       id="rect9"
       style="fill:#285e61;stroke:#68d391;stroke-width:2.26701" />
    <text
       x="510"
       y="232"
       class="code"
       id="text11">Contiene[string]</text>
    <text
       x="510"
       y="252"
       class="code"
       id="text12">func(arr []string, elem string) bool</text>
    <text
       x="510"
       y="270"
       class="note"
       id="text13">Busca en un slice de strings</text>
    <g
       id="g17-7"
       transform="translate(375,-10)">
      <g
         id="g18-5"
         transform="translate(-16.176472)">
        <rect
           x="100.19694"
           y="200.19693"
           width="101.95907"
           height="23.606129"
           class="box-param"
           id="rect6-3"
           style="fill:#744210;stroke:#f6ad55;stroke-width:2" />
        <text
           x="151.36006"
           y="216"
           class="code-label"
           id="text6-5">T = string</text>
      </g>
    </g>
  </g>
  <!-- Zona de código de ejemplo -->
  <g
     id="g22">
    <rect
       x="100"
       y="315"
       width="500"
       height="85"
       fill="#2d3748"
       stroke="#4a5568"
       stroke-width="1"
       rx="6"
       id="rect13" />
    <g
       id="g21"
       transform="translate(-25.905937,-3.0879517)">
      <text
         x="247.05882"
         y="337.05884"
         class="code"
         fill="#a0a0a0"
         id="text14">func main() {</text>
      <text
         x="331.45862"
         y="355.29413"
         class="code"
         fill="#a0a0a0"
         id="text15">nums := []int{1, 2, 3}</text>
      <text
         x="398.88831"
         y="371.52942"
         class="code"
         fill="#a0a0a0"
         id="text16">fmt.Println(Contiene(nums, 2)) // true</text>
      <text
         x="196.30882"
         y="392.47058"
         class="code"
         fill="#a0a0a0"
         id="text17">}</text>
    </g>

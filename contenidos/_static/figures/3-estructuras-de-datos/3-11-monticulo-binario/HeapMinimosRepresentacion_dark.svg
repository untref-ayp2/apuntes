  <text class="index-text" x="197" y="322">0</text>
  <text class="index-text" x="235" y="322">1</text>
  <text class="index-text" x="273" y="322">2</text>
  <text class="index-text" x="311" y="322">3</text>
  <text class="index-text" x="349" y="322">4</text>
  <text class="index-text" x="387" y="322">5</text>
  <text class="index-text" x="425" y="322">6</text>
  <text class="index-text" x="463" y="322">7</text>
  <text class="index-text" x="501" y="322">8</text>
</svg>

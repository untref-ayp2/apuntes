<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 700 370"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .edge { stroke: #e0e0e0; stroke-width: 2; fill: none; }
      .node-circle { fill: #2d3748; stroke: #63b3ed; stroke-width: 2.5; }
      .node-text { fill: #e0e0e0; font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .arrow { stroke: #63b3ed; stroke-width: 2; fill: none; }
      .array-cell { fill: #2d3748; stroke: #63b3ed; stroke-width: 1.5; }
      .array-text { fill: #e0e0e0; font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 14px; font-weight: normal; text-anchor: middle; dominant-baseline: central; }
      .index-text { fill: #a0aec0; font-family: ui-sans-serif, system-ui, sans-serif; font-size: 11px; text-anchor: middle; dominant-baseline: central; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#63b3ed" />
    </marker>
  </defs>
  <!-- Tree edges -->
  <line class="edge" x1="365" y1="40" x2="280" y2="100" />
  <line class="edge" x1="365" y1="40" x2="450" y2="100" />
  <line class="edge" x1="280" y1="100" x2="225" y2="160" />
  <line class="edge" x1="280" y1="100" x2="335" y2="160" />
  <line class="edge" x1="450" y1="100" x2="395" y2="160" />
  <line class="edge" x1="450" y1="100" x2="505" y2="160" />
  <line class="edge" x1="225" y1="160" x2="195" y2="220" />
  <line class="edge" x1="225" y1="160" x2="255" y2="220" />
  <!-- Tree nodes -->
  <circle class="node-circle" cx="365" cy="40" r="18" />
  <text class="node-text" x="365" y="40">10</text>
  <circle class="node-circle" cx="280" cy="100" r="18" />
  <text class="node-text" x="280" y="100">20</text>
  <circle class="node-circle" cx="450" cy="100" r="18" />
  <text class="node-text" x="450" y="100">30</text>
  <circle class="node-circle" cx="225" cy="160" r="18" />
  <text class="node-text" x="225" y="160">40</text>
  <circle class="node-circle" cx="335" cy="160" r="18" />
  <text class="node-text" x="335" y="160">50</text>
  <circle class="node-circle" cx="395" cy="160" r="18" />
  <text class="node-text" x="395" y="160">60</text>
  <circle class="node-circle" cx="505" cy="160" r="18" />
  <text class="node-text" x="505" y="160">70</text>
  <circle class="node-circle" cx="195" cy="220" r="18" />
  <text class="node-text" x="195" y="220">80</text>
  <circle class="node-circle" cx="255" cy="220" r="18" />
  <text class="node-text" x="255" y="220">90</text>
  <!-- Arrow -->
  <line class="arrow" x1="350" y1="252" x2="350" y2="270" marker-end="url(#arrowhead)" />
  <!-- Array cells -->
  <rect class="array-cell" x="179" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="197" y="295">10</text>
  <rect class="array-cell" x="217" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="235" y="295">20</text>
  <rect class="array-cell" x="255" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="273" y="295">30</text>
  <rect class="array-cell" x="293" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="311" y="295">40</text>
  <rect class="array-cell" x="331" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="349" y="295">50</text>
  <rect class="array-cell" x="369" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="387" y="295">60</text>
  <rect class="array-cell" x="407" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="425" y="295">70</text>
  <rect class="array-cell" x="445" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="463" y="295">80</text>
  <rect class="array-cell" x="483" y="280" width="36" height="30" rx="3" />
  <text class="array-text" x="501" y="295">90</text>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <defs>
    <style>
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; text-anchor: middle; fill: #e0e0e0; }
      .body { fill: #2d3748; stroke: #63b3ed; stroke-width: 2; }
      .counter { fill: #2d3748; stroke: #e0e0e0; stroke-width: 2; stroke-dasharray: 5,3; }
      .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; text-anchor: middle; fill: #e0e0e0; }
      .arrow { stroke: #e0e0e0; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e0e0e0" />
    </marker>
  </defs>

  <rect width="500" height="280" fill="#1e1e1e" rx="5" />

  <text x="250" y="35" class="title">Cola de Espera</text>

  <!-- Counter / register -->
  <rect x="20" y="80" width="60" height="120" rx="4" class="counter" />
  <text x="50" y="145" class="label">Caja</text>

  <!-- Arrow showing direction -->
  <line x1="85" y1="110" x2="120" y2="110" class="arrow" />

  <!-- Person 1 (being served) -->
  <circle cx="155" cy="115" r="20" fill="#2d3748" stroke="#63b3ed" stroke-width="2" />
  <rect x="140" y="135" width="30" height="55" rx="5" fill="#2d3748" stroke="#63b3ed" stroke-width="2" />
  <text x="155" y="209" class="label">Persona 1</text>

  <!-- Person 2 -->
  <circle cx="245" cy="115" r="20" fill="#285e61" stroke="#68d391" stroke-width="2" />
  <rect x="230" y="135" width="30" height="55" rx="5" fill="#285e61" stroke="#68d391" stroke-width="2" />
  <text x="245" y="209" class="label">Persona 2</text>

  <!-- Person 3 -->
  <circle cx="335" cy="115" r="20" fill="#744210" stroke="#f6ad55" stroke-width="2" />
  <rect x="320" y="135" width="30" height="55" rx="5" fill="#744210" stroke="#f6ad55" stroke-width="2" />
  <text x="335" y="209" class="label">Persona 3</text>

  <!-- Person 4 -->
  <circle cx="425" cy="115" r="20" fill="#4a5568" stroke="#fc8181" stroke-width="2" />
  <rect x="410" y="135" width="30" height="55" rx="5" fill="#4a5568" stroke="#fc8181" stroke-width="2" />
  <text x="425" y="209" class="label">Persona 4</text>

  <!-- FIFO label -->
  <text x="250" y="255" class="label" font-style="italic">FIFO: primero en llegar, primero en ser atendido</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 215">
  <defs>
    <style>
      .bg { fill: #f0f2f5; }
      .edge { stroke: #333333; stroke-width: 2; fill: none; }
      .node-circle { fill: #e1f5ff; stroke: #4682b4; stroke-width: 2.5; }
      .node-text { fill: #333333; font-family: monospace; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; fill: #666666; text-anchor: middle; font-style: italic; }
    </style>
  </defs>
  <rect class="bg" width="420" height="215" rx="8"/>
  <line class="edge" x1="50" y1="30" x2="105" y2="55"/>
  <line class="edge" x1="105" y1="55" x2="160" y2="80"/>
  <line class="edge" x1="160" y1="80" x2="215" y2="105"/>
  <line class="edge" x1="215" y1="105" x2="270" y2="130"/>
  <line class="edge" x1="270" y1="130" x2="325" y2="155"/>
  <line class="edge" x1="325" y1="155" x2="380" y2="180"/>
  <circle class="node-circle" cx="50" cy="30" r="16"/><text class="node-text" x="50" y="30">17</text>
  <circle class="node-circle" cx="105" cy="55" r="16"/><text class="node-text" x="105" y="55">18</text>
  <circle class="node-circle" cx="160" cy="80" r="16"/><text class="node-text" x="160" y="80">19</text>
  <circle class="node-circle" cx="215" cy="105" r="16"/><text class="node-text" x="215" y="105">20</text>
  <circle class="node-circle" cx="270" cy="130" r="16"/><text class="node-text" x="270" y="130">21</text>
  <circle class="node-circle" cx="325" cy="155" r="16"/><text class="node-text" x="325" y="155">22</text>
  <circle class="node-circle" cx="380" cy="180" r="16"/><text class="node-text" x="380" y="180">23</text>
  <text class="label" x="210" y="205">Árbol binario de búsqueda degenerado</text>
</svg>
  <circle class="node-circle" cx="128" cy="68" r="16"/>
  <text class="node-text" x="128" y="68">9</text>
  <line class="arrow" x1="168" y1="68" x2="216" y2="68"/>
  <polygon class="arrowhead" points="214,63 224,68 214,73"/>
  <line class="edge" x1="312" y1="28" x2="272" y2="68"/>
  <line class="edge" x1="312" y1="28" x2="352" y2="68"/>

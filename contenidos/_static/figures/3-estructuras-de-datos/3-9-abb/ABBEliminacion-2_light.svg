      .node-text { fill: #333333; font-family: monospace; font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .deleted-circle { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; stroke-dasharray: 4,2; }
      .deleted-text { fill: #e9967a; font-family: monospace; font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .cross { stroke: #e9967a; stroke-width: 2; }
      .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 10px; fill: #666666; text-anchor: middle; font-style: italic; }
      .arrow { stroke: #666666; stroke-width: 1.5; fill: none; }
      .arrowhead { fill: #666666; }
    </style>
  </defs>
  <rect class="bg" width="400" height="160" rx="6"/>
  <text class="label" x="88" y="12">Antes</text>
  <text class="label" x="312" y="12">Después</text>

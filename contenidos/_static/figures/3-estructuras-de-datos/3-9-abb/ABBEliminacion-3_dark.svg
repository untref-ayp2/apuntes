      .node-text { fill: #e0e0e0; font-family: monospace; font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
      .highlight-circle { fill: #3a3000; stroke: #ecc94b; stroke-width: 2; }

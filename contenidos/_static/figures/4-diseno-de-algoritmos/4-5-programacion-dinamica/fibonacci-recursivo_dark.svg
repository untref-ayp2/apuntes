   <polygon points="76.13,411.5 73.63,415 78.88,415" fill="#666666" stroke="#666666" stroke-miterlimit="10" transform="translate(0.5,0.5)"/>
   <!-- Fibonacci(5) - 1 llamada - azul -->
   <rect x="0.5" y="0.5" width="160" height="30" rx="4.5" ry="4.5" fill="#1e1e1e" stroke="#63b3ed" stroke-width="2"/>
   <text x="80.5" y="20.5" font-family="Helvetica" font-size="16px" text-anchor="middle" fill="#e0e0e0">Fibonacci(5)</text>
   <!-- Rama: Fibonacci(4) -> Fibonacci(3) izquierda -->

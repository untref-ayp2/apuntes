   <polygon points="236.13,131.5 233.63,135 238.88,135" fill="#666666" stroke="#666666" stroke-miterlimit="10" transform="translate(0.5,0.5)"/>
   <!-- Rama: Fibonacci(3) izquierda -> Fibonacci(1) derecha -->

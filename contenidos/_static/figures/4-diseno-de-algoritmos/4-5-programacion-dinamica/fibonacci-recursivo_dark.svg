   <text x="160.5" y="60.5" font-family="Helvetica" font-size="16px" text-anchor="middle" fill="#e0e0e0">Fibonacci(4)</text>
   <!-- Rama: Fibonacci(3) izquierda -> Fibonacci(2) izquierda -->

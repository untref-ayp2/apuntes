   <!-- Árbol de llamadas recursivas de Fibonacci(5) -->
   <!-- Rama: Fibonacci(5) -> Fibonacci(4) -->
   <path d="m 40.5,30.5 q 0,25 33.63,25" fill="none" stroke="#666666" stroke-miterlimit="10" id="path1"/>
   <polygon points="76.13,51.5 73.63,55 78.88,55" fill="#666666" stroke="#666666" stroke-miterlimit="10" transform="translate(0.5,0.5)"/>
   <!-- Rama: Fibonacci(5) -> Fibonacci(3) -->

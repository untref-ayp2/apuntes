     <rect x="90" y="12" width="20" height="14" rx="2" fill="#1e1e1e" stroke="#fc8181" stroke-width="1.5"/>
     <text x="116" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12px" fill="#e0e0e0">2 veces</text>
     <rect x="190" y="12" width="20" height="14" rx="2" fill="#1e1e1e" stroke="#68d391" stroke-width="1.5"/>
     <text x="216" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12px" fill="#e0e0e0">3 veces</text>
     <rect x="290" y="12" width="20" height="14" rx="2" fill="#1e1e1e" stroke="#b794f4" stroke-width="1.5"/>
     <text x="316" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12px" fill="#e0e0e0">5 veces</text>

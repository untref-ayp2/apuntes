   <rect x="240.5" y="520.5" width="160" height="30" rx="4.5" ry="4.5" fill="#1e1e1e" stroke="#68d391" stroke-width="2"/>
   <text x="320.5" y="540.5" font-family="Helvetica" font-size="16px" text-anchor="middle" fill="#e0e0e0">Fibonacci(0)</text>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 591.87408 310"
   width="591.87408"
   height="310"
   version="1.1"
   id="svg17"
   sodipodi:docname="ListaEnlazadaCircularEliminacionFirst_light.svg"
   inkscape:version="1.4.4"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <rect
     width="591.87408"
     height="310"
     fill="#f0f2f5"
     id="rect1"
     x="0"
     y="0"
     style="stroke-width:0.88835" />
  <defs
     id="defs2">
    <style
       id="style1">
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; text-anchor: middle; font-weight: bold; fill: #333333; }
      .code { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 16px; text-anchor: middle; fill: #333333; }
      .variable-node { fill: #e1f5ff; stroke: #4682b4; stroke-width: 2; }
      .value-node { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; }
      .deleted { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; opacity: 0.5; }
      .arrow { stroke: #333333; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .arrow-circ { stroke: #333333; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .deleted-arrow { stroke: #cc0000; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead-deleted); fill: none; }
      .note { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: middle; font-style: italic; fill: #666666; }
      .cross { stroke: #cc0000; stroke-width: 3; }
      .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: start; font-style: italic; fill: #333333; }
    </style>
    <marker
       id="arrowhead"
       markerWidth="10"
       markerHeight="7"
       refX="10"
       refY="3.5"
       orient="auto">
      <polygon
         points="10,3.5 0,7 0,0 "
         fill="#333333"
         id="polygon1" />
    </marker>
    <marker
       id="arrowhead-deleted"
       markerWidth="10"
       markerHeight="7"
       refX="10"
       refY="3.5"
       orient="auto">
      <polygon
         points="10,3.5 0,7 0,0 "
         fill="#cc0000"
         id="polygon2" />
    </marker>
  </defs>
  <text
     x="295.93704"
     y="29.999985"
     class="title"
     id="text2">Eliminación del primer elemento en Lista Circular Doble</text>

  <!-- ===== ANTES ===== -->
  <g id="g17">
    <text x="20" y="95" class="label" id="text3">Antes</text>

    <!-- head arrow -->
    <text x="52" y="82" class="note" style="font-size:13px;fill:#333;font-weight:bold">head</text>
    <line x1="70" y1="80" x2="104" y2="100" class="arrow" id="line-head1" />

    <rect x="110" y="82" width="60" height="36" rx="4" class="deleted" id="rect3" />
    <text x="140" y="104" class="code" id="text4">E1</text>
    <line x1="115" y1="87" x2="165" y2="113" class="cross" id="cross1" />
    <line x1="165" y1="87" x2="115" y2="113" class="cross" id="cross2" />

    <rect x="210" y="82" width="60" height="36" rx="4" class="value-node" id="rect4" />
    <text x="240" y="104" class="code" id="text5">E2</text>

    <rect x="310" y="82" width="60" height="36" rx="4" class="variable-node" id="rect5" />
    <text x="340" y="104" class="code" id="text6">E3</text>

    <!-- next arrows -->
    <line x1="172" y1="100" x2="198" y2="100" class="deleted-arrow" id="line8" />
    <line x1="272" y1="100" x2="298" y2="100" class="arrow" id="line9" />
    <line x1="372" y1="100" x2="408" y2="100" class="arrow-circ" id="line10" />

    <!-- prev arrows (curved below for doble) -->
    <path d="m 240,118 q -65,20 -130,0" class="arrow" style="stroke:#9f7aea;marker-end:url(#arrowhead)" id="prev1" />
    <path d="m 340,118 q -65,20 -130,0" class="arrow" style="stroke:#9f7aea;marker-end:url(#arrowhead)" id="prev2" />

    <!-- circular arrows -->
    <path d="M 372,100 C 420,60 490,70 500,100 C 510,130 440,145 372,140"
          class="arrow-circ" style="stroke-dasharray:4,3" id="circ1" />
    <path d="M 140,100 C 90,55 20,65 15,100 C 10,135 80,150 140,140"
          class="arrow-circ" id="circ-antes"
          style="fill:none;stroke:#333;stroke-width:1.5;marker-end:url(#arrowhead);stroke-dasharray:3,2" />
  </g>

  <!-- ===== DESPUÉS ===== -->
  <g id="g18">
    <text x="20" y="205" class="label" id="text11">Después</text>

    <!-- head arrow pointing to E2 -->
    <text x="52" y="192" class="note" style="font-size:13px;fill:#333;font-weight:bold">head</text>
    <line x1="70" y1="190" x2="204" y2="210" class="arrow" id="line-head2" />

    <rect x="110" y="192" width="60" height="36" rx="4" class="deleted" id="rect11"
          style="opacity:0.3;fill:#ffe1e1;stroke:#e9967a" />
    <text x="140" y="214" class="code" id="text12" style="opacity:0.3">E1</text>

    <rect x="210" y="192" width="60" height="36" rx="4" class="variable-node" id="rect12" />
    <text x="240" y="214" class="code" id="text13">E2</text>

    <rect x="310" y="192" width="60" height="36" rx="4" class="variable-node" id="rect13" />
    <text x="340" y="214" class="code" id="text14">E3</text>

    <!-- next arrows -->
    <line x1="272" y1="210" x2="298" y2="210" class="arrow" id="line15" />
    <line x1="372" y1="210" x2="408" y2="210" class="arrow-circ" id="line16" />

    <!-- prev arrows -->
    <path d="m 240,228 q -65,20 -130,0" class="arrow" style="stroke:#9f7aea;marker-end:url(#arrowhead)" id="prev3" />
    <path d="m 340,228 q -65,20 -130,0" class="arrow" style="stroke:#9f7aea;marker-end:url(#arrowhead)" id="prev4" />

    <!-- circular arrow from E3 back to E2 -->
    <path d="M 372,210 C 420,175 440,165 430,145 C 420,125 390,120 340,125"
          class="arrow-circ" id="circ2"
          style="fill:none;stroke:#333;stroke-width:1.5;marker-end:url(#arrowhead)" />
  </g>

  <text x="295" y="290" class="note" id="text15">
    Se actualiza head a E2 y se mantiene el ciclo: E3.next = E2, E2.prev = E3
  </text>
</svg>

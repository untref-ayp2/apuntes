<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 750 310"
   width="750"
   height="310"
   version="1.1"
   id="svg10"
   sodipodi:docname="ListaEnlazadaDobleInsercionBefore_light.svg"
   inkscape:version="1.4.4"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <rect
     width="750"
     height="310"
     fill="#f0f2f5"
     id="rect1"
     x="0"
     y="0" />
  <defs
     id="defs1">
    <style
       id="style1">
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; text-anchor: middle; font-weight: bold; fill: #333333; }
      .code { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 16px; text-anchor: middle; fill: #333333; }
      .variable-node { fill: #e1f5ff; stroke: #4682b4; stroke-width: 2; }
      .value-node { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; }
      .new-node { fill: #e1ffe1; stroke: #2e8b57; stroke-width: 2; stroke-dasharray: 4,3; }
      .arrow { stroke: #333333; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .arrow-prev { stroke: #9f7aea; stroke-width: 2; marker-end: url(#arrowhead-prev); fill: none; }
      .dashed-arrow { stroke: #333333; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead); fill: none; }
      .note { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; text-anchor: middle; font-style: italic; fill: #666666; }
      .label-prev { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 13px; text-anchor: middle; font-style: italic; fill: #9f7aea; }
    </style>
    <marker
       id="arrowhead"
       markerWidth="10"
       markerHeight="7"
       refX="10"
       refY="3.5"
       orient="auto">
      <polygon
         points="0 0, 10 3.5, 0 7"
         fill="#333333"
         id="polygon1" />
    </marker>
    <marker
       id="arrowhead-prev"
       markerWidth="10"
       markerHeight="7"
       refX="10"
       refY="3.5"
       orient="auto">
      <polygon
         points="0 0, 10 3.5, 0 7"
         fill="#9f7aea"
         id="polygon2" />
    </marker>
  </defs>
  <text
     x="375"
     y="30"
     class="title"
     id="text1">Inserción antes de un elemento en Lista Enlazada Doble</text>

  <!-- === TEXTO EXPLICATIVO SUPERIOR === -->
  <text x="120" y="65" class="code" style="text-anchor:start;font-size:14px;fill:#666666">
    InsertBefore(E2, Nuevo): se agrega Nuevo antes de E2
  </text>

  <!-- === ETIQUETAS DE COLUMNA === -->
  <text x="154.57" y="92" class="note" style="font-size:12px;fill:#999">sig</text>
  <text x="274.57" y="92" class="note" style="font-size:12px;fill:#999">sig</text>
  <text x="394.57" y="92" class="note" style="font-size:12px;fill:#999">sig</text>
  <text x="514.57" y="92" class="note" style="font-size:12px;fill:#999">sig</text>

  <!-- === NODOS === -->
  <rect x="124.57312" y="100.86621" width="60" height="36" rx="4" class="variable-node" id="rect2" />
  <text x="154.57312" y="122.86621" class="code" id="text2">E1</text>

  <rect x="244.57312" y="100.86621" width="60" height="36" rx="4" class="new-node" id="rect4" />
  <text x="274.57312" y="122.86621" class="code" id="text4">Nuevo</text>

  <rect x="364.57312" y="100.86621" width="60" height="36" rx="4" class="value-node" id="rect3" />
  <text x="394.57312" y="122.86621" class="code" id="text3">E2</text>

  <rect x="484.57312" y="100.86621" width="60" height="36" rx="4" class="variable-node" id="rect5" />
  <text x="514.57312" y="122.86621" class="code" id="text5">E3</text>

  <text x="620.19885" y="138.85043" class="note" id="text6">nil</text>

  <!-- === FLECHAS next (horizontales, arriba) === -->
  <line x1="186.57312" y1="118.86621" x2="232.57312" y2="118.86621" class="arrow" id="line1" />
  <line x1="306.57312" y1="118.86621" x2="352.57312" y2="118.86621" class="arrow" id="line2" />
  <line x1="426.57312" y1="118.86621" x2="472.57312" y2="118.86621" class="arrow" id="line3" />
  <line x1="546.57312" y1="118.86621" x2="614.57312" y2="118.86621" class="arrow" id="line4" />

  <!-- === FLECHA PUNTEADA InsertBefore === -->
  <path d="m 394.57312,136.86621 v 32 h -120 v -32" class="dashed-arrow" id="path9" />
  <text x="334.57312" y="191.86621" class="note" id="text9">InsertBefore</text>

  <!-- === FLECHAS prev (curvas, abajo) === -->
  <!-- Nuevo.prev → E1 -->
  <path d="m 274.57312,148.86621 q -60,28 -120,0" class="arrow-prev" id="path-prev1" />
  <text x="214.57312" y="173.86621" class="label-prev" id="label-prev1">prev</text>

  <!-- E2.prev → Nuevo -->
  <path d="m 394.57312,148.86621 q -60,28 -120,0" class="arrow-prev" id="path-prev2" />
  <text x="334.57312" y="173.86621" class="label-prev" id="label-prev2">prev</text>

  <!-- E3.prev → E2 -->
  <path d="m 514.57312,148.86621 q -60,28 -120,0" class="arrow-prev" id="path-prev3" />
  <text x="454.57312" y="173.86621" class="label-prev" id="label-prev3">prev</text>

  <!-- === NOTA INFERIOR === -->
  <text x="375" y="280" class="note" id="text10">
    Se ajustan 4 enlaces: 2 next (E1→Nuevo, Nuevo→E2) y 2 prev (Nuevo→E1, E2→Nuevo)
  </text>
</svg>

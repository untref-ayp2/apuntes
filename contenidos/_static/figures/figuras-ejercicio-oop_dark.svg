<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" width="740" height="320">
  <defs>
    <style>
      .bg { fill: #1e1e1e; }
      .class-box { fill: #2d3748; stroke: #63b3ed; stroke-width: 2; }
      .class-name { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 18px; font-weight: bold; fill: #e0e0e0; text-anchor: middle; }
      .section-line { stroke: #63b3ed; stroke-width: 1; }
      .field { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 14px; fill: #e0e0e0; text-anchor: start; }
      .method { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 14px; fill: #e0e0e0; text-anchor: start; }
      .arrow-line { stroke: #e0e0e0; stroke-width: 2; }
      .comp-diamond { fill: #e0e0e0; stroke: #e0e0e0; stroke-width: 2; }
      .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #a0a0a0; text-anchor: middle; font-style: italic; }
      .int-name { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #a0a0a0; text-anchor: middle; font-style: normal; }
    </style>
  </defs>

  <rect class="bg" width="740" height="320" rx="8" />

  <text class="class-name" x="370" y="25" font-size="20">Diagrama de *structs*: figuras</text>

  <!-- Cuadrado -->
  <rect class="class-box" x="20" y="65" width="280" height="160" rx="4" />
  <text class="class-name" x="160" y="90">Cuadrado</text>
  <line class="section-line" x1="20" y1="100" x2="300" y2="100" />
  <text class="field" x="35" y="120">(embebe Rectangulo)</text>
  <line class="section-line" x1="20" y1="148" x2="300" y2="148" />
  <text class="method" x="35" y="168">+ Area() float64</text>
  <text class="method" x="35" y="185">+ Perimetro() float64</text>
  <text class="method" x="35" y="202">+ Exportar(ruta string) error</text>

  <!-- Composition arrow -->
  <line class="arrow-line" x1="314" y1="145" x2="440" y2="145" />
  <polygon class="comp-diamond" points="300,145 307,138 314,145 307,152" />

  <text class="label" x="377" y="130">está</text>
  <text class="label" x="377" y="143">compuesto por</text>

  <!-- Rectangulo -->
  <rect class="class-box" x="440" y="65" width="280" height="160" rx="4" />
  <text class="class-name" x="580" y="90">Rectangulo</text>
  <line class="section-line" x1="440" y1="100" x2="720" y2="100" />
  <text class="field" x="455" y="120">- base float64</text>
  <text class="field" x="455" y="137">- altura float64</text>
  <line class="section-line" x1="440" y1="150" x2="720" y2="150" />
  <text class="method" x="455" y="170">+ Area() float64</text>
  <text class="method" x="455" y="187">+ Perimetro() float64</text>
  <text class="method" x="455" y="204">+ Exportar(ruta string) error</text>
</svg>